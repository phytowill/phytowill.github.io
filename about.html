<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>About – William Dwyer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&family=Fira+Code:wght@300..700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg:        #ffffff;
      --ink:       #000000;
      --mid:       #000000;
      --accent:    #000000;
      --border:    #e0e0e0;
      --font-serif: 'Manrope', sans-serif;
      --font-mono:  'Fira Code', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font-serif);
      font-size: 18px;
      font-weight: 300;
      line-height: 1.4;
      letter-spacing: -0.1px;
      min-height: 100vh;
    }

    a { color: inherit; text-decoration: none; }

    /* ─── Header ────────────────────────────────────────────── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--bg);
      padding: 0 clamp(1.5rem, 5vw, 4rem);
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 58px;
    }

    .site-title {
      font-family: var(--font-serif);
      font-size: 1.375rem;
      font-weight: 700;
      letter-spacing: -0.1px;
      color: var(--ink);
    }

    .site-title span { font-weight: 700; }

    nav { display: flex; gap: 2rem; }

    nav a {
      font-family: var(--font-serif);
      font-size: 1.375rem;
      font-weight: 400;
      letter-spacing: -0.1px;
      color: var(--ink);
      transition: opacity 0.2s;
      position: relative;
    }

    nav a::after {
      content: '';
      position: absolute;
      left: 0; bottom: -2px;
      width: 0; height: 1px;
      background: var(--accent);
      transition: width 0.25s ease;
    }

    nav a:hover::after { width: 100%; }

    /* ─── Content ───────────────────────────────────────────── */
    .about {
      padding: clamp(3rem, 8vw, 6rem) clamp(1.5rem, 5vw, 4rem);
      max-width: 680px;
    }

    .about h1 {
      font-size: clamp(2.15rem, 2.15rem + ((1vw - 0.2rem) * 1.333), 3rem);
      font-weight: 400;
      line-height: 1.125;
      letter-spacing: -0.1px;
      margin-bottom: 1.5rem;
    }

    .about p {
      font-size: clamp(1rem, 1rem + ((1vw - 0.2rem) * 0.196), 1.125rem);
      font-weight: 300;
      line-height: 1.6;
      margin-bottom: 1rem;
    }

    /* ─── Footer ─────────────────────────────────────────────── */
    footer {
      border-top: 1px solid var(--border);
      padding: 1.4rem clamp(1.5rem, 5vw, 4rem);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.75rem;
      position: fixed;
      bottom: 0;
      width: 100%;
      background: var(--bg);
    }

    footer p {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      font-weight: 300;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .footer-links { display: flex; gap: 1.5rem; }

    .footer-links a {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      font-weight: 300;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <header>
    <a class="site-title" href="index.html">William Dwyer <span>– Biologist</span></a>
    <nav>
      <a href="about.html">About</a>
      <a href="mailto:wpdwyer@stanford.edu">Contact</a>
      <a href="index.html#publications">Publications</a>
      <a href="index.html#research">Research</a>
    </nav>
  </header>

  <section class="about">
    <h1>About</h1>
    <p>Add your bio here.</p>
  </section>

  <footer>
    <p>© 2026 William P. Dwyer</p>
    <div class="footer-links">
      <a href="https://github.com/phytowill" target="_blank">GitHub</a>
      <a href="https://scholar.google.com/citations?user=A17ZNBkAAAAJ&hl=en" target="_blank">Scholar</a>
      <a href="mailto:wpdwyer@stanford.edu">Email</a>
      <a href="https://orcid.org/0000-0003-3532-8754" target="_blank">ORCID</a>
      <a href="cv.pdf" target="_blank">CV</a>
    </div>
  </footer>

</body>
</html>
